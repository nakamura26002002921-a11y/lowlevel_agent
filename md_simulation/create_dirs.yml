- hosts: all
  become: no

  vars:
    DIRS:
      - md
      - mdp
      - sys
      - em
      - nvt
      - npt_br
      - npt_pr

  tasks:
    - name: Ensure base path exists
      file:
        path: "{{ PATH }}"
        state: directory
        mode: '0755'

    - name: Create required subdirectories under PATH
      file:
        path: "{{ PATH }}/{{ item }}"
        state: directory
        mode: '0755'
      loop: "{{ DIRS }}"
