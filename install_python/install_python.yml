- name: Install Python from source
  hosts: localhost
  connection: local
  gather_facts: true
  become: true

  vars:
    version: "{{ version | default('3.11.2') }}"
    install_path: "{{ install_path | default('/opt/python311') }}"
    src_dir: "/tmp/Python-{{ version }}"
    tarball: "/tmp/python.tgz"

  tasks:
    - name: Ensure build dependencies are installed
      ansible.builtin.apt:
        name:
          - build-essential
          - libssl-dev
          - zlib1g-dev
          - libncurses5-dev
          - libffi-dev
          - libsqlite3-dev
          - libreadline-dev
          - libbz2-dev
        state: present
        update_cache: true

    - name: Download Python source tarball
      ansible.builtin.get_url:
        url: "https://www.python.org/ftp/python/{{ version }}/Python-{{ version }}.tgz"
        dest: "{{ tarball }}"
        mode: "0644"

    - name: Extract Python source
      ansible.builtin.unarchive:
        src: "{{ tarball }}"
        dest: "/tmp"
        remote_src: true

    - name: Build and install Python
      ansible.builtin.shell: |
        set -e
        cd {{ src_dir }}
        ./configure --prefix={{ install_path }}
        make -j$(nproc)
        make install
      args:
        creates: "{{ install_path }}/bin/python3"
