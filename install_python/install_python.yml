- hosts: localhost
  connection: local
  gather_facts: yes
  become: yes

  vars:
    VERSION: "{{ VERSION | default('3.11.2') }}"
    INSTALL_PATH: "{{ INSTALL_PATH | default('/opt/python311') }}"
    SRC_DIR: "/tmp/Python-{{ VERSION }}"
    TARBALL: "/tmp/python.tgz"

  tasks:
    - name: Ensure build dependencies are installed
      apt:
        name:
          - build-essential
          - libssl-dev
          - zlib1g-dev
          - libncurses5-dev
          - libffi-dev
          - libsqlite3-dev
          - libreadline-dev
          - libbz2-dev
        state: present
        update_cache: yes

    - name: Download Python source tarball
      get_url:
        url: "https://www.python.org/ftp/python/{{ VERSION }}/Python-{{ VERSION }}.tgz"
        dest: "{{ TARBALL }}"
        mode: '0644'

    - name: Extract Python source
      unarchive:
        src: "{{ TARBALL }}"
        dest: "/tmp"
        remote_src: yes

    - name: Configure, build and install Python (idempotent)
      shell: |
        set -e
        cd {{ SRC_DIR }}
        ./configure --prefix={{ INSTALL_PATH }}
        make -j$(nproc)
        make install
      args:
        creates: "{{ INSTALL_PATH }}/bin/python3"
