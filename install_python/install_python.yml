- name: Install Python from source
  hosts: localhost
  connection: local
  gather_facts: false
  become: true

  vars:
    version: "{{ VERSION | default('3.10.11') }}"
    install_path: "{{ INSTALL_PATH | default('/usr/local/python3.10') }}"
    src_dir: "/tmp/Python-{{ version }}"
    tarball: "/tmp/Python-{{ version }}.tgz"

  tasks:
    - name: Ensure build dependencies are installed
      ansible.builtin.apt:
        name:
          - build-essential
          - libssl-dev
          - zlib1g-dev
          - libncurses5-dev
          - libffi-dev
          - libsqlite3-dev
          - libreadline-dev
          - libbz2-dev
          - liblzma-dev
          - tk-dev
          - uuid-dev
          - xz-utils
        state: present
        update_cache: true

    - name: Remove old source directory
      ansible.builtin.file:
        path: "{{ src_dir }}"
        state: absent

    - name: Remove old tarball
      ansible.builtin.file:
        path: "{{ tarball }}"
        state: absent

    - name: Download Python source tarball
      ansible.builtin.get_url:
        url: "https://www.python.org/ftp/python/{{ version }}/Python-{{ version }}.tgz"
        dest: "{{ tarball }}"
        mode: "0644"

    - name: Extract Python source
      ansible.builtin.unarchive:
        src: "{{ tarball }}"
        dest: "/tmp"
        remote_src: true

    - name: Check extracted directory
      ansible.builtin.stat:
        path: "{{ src_dir }}"
      register: python_src

    - name: Fail if source not found
      ansible.builtin.fail:
        msg: "Python source directory not found at {{ src_dir }}"
      when: not python_src.stat.exists

    - name: Build and install Python
      ansible.builtin.shell: |
        set -e
        cd {{ src_dir }}
        ./configure --prefix={{ install_path }} --enable-optimizations
        make -j$(nproc)
        make altinstall
      args:
        creates: "{{ install_path }}/bin/python3"

