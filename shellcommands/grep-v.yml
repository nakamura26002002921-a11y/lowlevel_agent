---
- name: Filter lines from files
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    before_path: "{{ PATH }}/input_file"
    after_path: "{{ PATH }}/filtered_file"
    exclude_string: "XXX"

  tasks:
    - name: Filter lines containing a specific string
      ansible.builtin.shell: grep -v "{{ exclude_string }}" "{{ before_path }}" > "{{ after_path }}"
      args:
        executable: /bin/bash
      changed_when: false
